<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src {{cspSource}} 'wasm-unsafe-eval'; worker-src blob:;">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c0c0d; user-select: none; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { color: #a5a5a5; position: absolute; top: 15px; left: 15px; font-family: monospace; font-size: 12px; pointer-events: none; line-height: 1.5; z-index: 10;}
        #scaleContainer { position: absolute; bottom: 20px; right: 20px; font-family: monospace; font-size: 11px; color: #ffffff; text-align: center; z-index: 10; pointer-events: none; }
        #scaleBar { height: 4px; background: #ffffff; border: 1px solid #000; margin-top: 4px; }
        .dg.ac { z-index: 20 !important; }
        #loadingOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; font-family: monospace; color: #d0d0d0; background: #0c0c0d; z-index: 30; }
        #loadingOverlay.hidden { display: none; }
        #loadingBarTrack { width: 320px; height: 8px; background: #2a2a2c; border-radius: 4px; overflow: hidden; }
        #loadingBarFill { width: 0%; height: 100%; background: #4a9eff; transition: width 0.15s ease-out; }
        #loadingPhase { font-size: 12px; }
        #loadingPercent { font-size: 11px; color: #808080; }
        #debugPanel { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 240px; z-index: 40; background: rgba(0,0,0,0.88); border-top: 1px solid #333; display: flex; flex-direction: column; }
        #debugPanel.hidden { display: none; }
        #debugPanelHeader { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; font-family: monospace; font-size: 11px; color: #999; border-bottom: 1px solid #333; }
        #debugPanelHeader button { font-family: monospace; font-size: 10px; background: #2a2a2c; color: #ddd; border: 1px solid #444; border-radius: 3px; padding: 2px 8px; cursor: pointer; }
        #debugLog { overflow-y: auto; padding: 6px 8px; font-family: monospace; font-size: 10px; color: #7fff7f; white-space: pre-wrap; word-break: break-all; user-select: text; }
        #debugLog .err { color: #ff7f7f; }
        #debugToggleBtn { position: absolute; bottom: 8px; left: 8px; z-index: 41; font-family: monospace; font-size: 10px; background: #2a2a2c; color: #999; border: 1px solid #444; border-radius: 3px; padding: 2px 8px; cursor: pointer; opacity: 0.6; }
        #debugToggleBtn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div id="ui"></div>
    <div id="loadingOverlay">
        <div id="loadingBarTrack"><div id="loadingBarFill"></div></div>
        <div id="loadingPhase">Loading GDS...</div>
        <div id="loadingPercent"></div>
    </div>
    <canvas id="glCanvas"></canvas>

    <div id="debugPanel" class="hidden">
        <div id="debugPanelHeader">
            <span>Debug log</span>
            <button id="debugCopyBtn" type="button">Copy all</button>
        </div>
        <div id="debugLog"></div>
    </div>
    <button id="debugToggleBtn" type="button">Debug log</button>

    <div id="scaleContainer">
        <div id="scaleLabel">0 μm</div>
        <div id="scaleBar" style="width: 100px;"></div>
    </div>

    <!-- Base64 of gdstk_wasm.js's + wasm-worker.js's concatenated text (see
         extension.cjs) -- inert (not executed) since "text/plain" isn't a JS
         mimetype. viewer.js reads this via textContent + atob() to build the
         Worker's Blob script, since neither importScripts() (from the
         Worker) nor fetch() (from this main thread) can reach VS Code's
         webview resource protocol, and pushing this much text through
         postMessage() broke opening the editor entirely. -->
    <script type="text/plain" id="workerBundle">{{workerBundleBase64}}</script>

    <!-- Webview Local Script Injection Pipeline -->
    <script src="wasm/build/gdstk_wasm.js"></script>
    <script src="vendor/dat.gui.min.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
